<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; width: 220px; padding: 15px; margin: 0; background-color: #1e1e2e; color: #cdd6f4; }
    h2 { margin-top: 0; font-size: 16px; display: flex; align-items: center; gap: 8px; color: #f5c2e7; margin-bottom: 20px;}
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #585b70; transition: .4s; border-radius: 24px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: #cdd6f4; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #89b4fa; }
    input:checked + .slider:before { transform: translateX(20px); }
    .container { display: flex; align-items: center; justify-content: space-between; }
    .status-text { font-weight: 600; font-size: 14px; }
    .status-on { color: #89b4fa; }
    .status-off { color: #a6adc8; }
  </style>
</head>
<body>
  <h2><img src="icon16.png" alt="icon"> Auto-Cleaner</h2>
  <div class="container">
    <span class="status-text status-on" id="statusLabel">Activado</span>
    <label class="switch">
      <input type="checkbox" id="toggleSwitch" checked>
      <span class="slider"></span>
    </label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
